<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column}
.loading .spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top:4px solid #1a73e8;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Setup Screen */
.setup{max-width:500px;margin:80px auto;background:#fff;border-radius:16px;padding:40px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center}
.setup h1{font-size:28px;margin-bottom:8px;color:#1a73e8}
.setup p{color:#666;margin-bottom:24px}
.setup .btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:all .2s}
.setup .btn-primary{background:#1a73e8;color:#fff}
.setup .btn-primary:hover{background:#1557b0}
.setup .btn-secondary{background:#f0f2f5;color:#333;border:2px solid #ddd}
.setup input[type=text]{width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:12px;outline:none}
.setup input:focus{border-color:#1a73e8}
.setup .or{color:#999;margin:16px 0;font-size:14px}
.setup .msg{padding:10px;border-radius:8px;margin-top:12px;font-size:14px}
.setup .msg.ok{background:#e8f5e9;color:#2e7d32}
.setup .msg.err{background:#fce4ec;color:#c62828}

/* Main App Layout */
.app{display:none}
.topbar{background:#1a73e8;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:20px;font-weight:700}
.topbar .user-info{font-size:13px;opacity:.9}
.sidebar{position:fixed;left:0;top:52px;bottom:0;width:220px;background:#fff;border-right:1px solid #e0e0e0;padding:16px 0;overflow-y:auto}
.sidebar a{display:flex;align-items:center;padding:10px 20px;color:#555;text-decoration:none;font-size:14px;font-weight:500;border-left:3px solid transparent;transition:all .15s}
.sidebar a:hover,.sidebar a.active{background:#e8f0fe;color:#1a73e8;border-left-color:#1a73e8}
.main{margin-left:220px;padding:24px;min-height:calc(100vh - 52px)}

/* Cards & Tables */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card .label{font-size:13px;color:#888;margin-bottom:4px}
.card .value{font-size:28px;font-weight:700;color:#1a73e8}
.card .sub{font-size:12px;color:#aaa;margin-top:4px}
.panel{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
.panel h2{font-size:18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f5f7fa;padding:10px 12px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e0e0e0;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#f8f9ff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:#e3f2fd;color:#1565c0}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-orange{background:#fff3e0;color:#e65100}

/* Buttons */
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-p{background:#1a73e8;color:#fff}
.btn-p:hover{background:#1557b0}
.btn-d{background:#fce4ec;color:#c62828}
.btn-d:hover{background:#ef9a9a}
.btn-g{background:#e8f5e9;color:#2e7d32}

/* Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:20px;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;transition:border .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#1a73e8}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:500;z-index:999;transform:translateX(120%);transition:transform .3s;max-width:360px}
.toast.show{transform:translateX(0)}
.toast.ok{background:#2e7d32}
.toast.err{background:#c62828}

/* Responsive */
@media(max-width:768px){
.sidebar{display:none}
.main{margin-left:0}
.form-row{grid-template-columns:1fr}
.cards{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen" class="loading">
  <div class="spinner"></div>
  <p style="margin-top:16px;color:#888">Đang khởi tạo BCRM...</p>
</div>

<!-- Setup -->
<div id="setupScreen" class="setup" style="display:none">
  <h1>BCRM</h1>
  <p>Quản lý Khách hàng trên Google Sheet</p>
  <button class="btn btn-primary" onclick="createNewSheet()">Tạo Google Sheet mới</button>
  <div class="or">— hoặc —</div>
  <input type="text" id="existingId" placeholder="Dán ID Google Sheet có sẵn...">
  <button class="btn btn-secondary" onclick="connectSheet()">Kết nối Sheet có sẵn</button>
  <div id="setupMsg"></div>
</div>

<!-- Main App -->
<div id="app" class="app">
  <div class="topbar">
    <h1>BCRM</h1>
    <span class="user-info" id="userInfo"></span>
  </div>
  <div class="sidebar">
    <a href="#" class="active" onclick="showPage('dashboard')">📊 Dashboard</a>
    <a href="#" onclick="showPage('customers')">👥 Khách hàng</a>
    <a href="#" onclick="showPage('interactions')">💬 Tương tác</a>
    <a href="#" onclick="showPage('settings')">⚙️ Cài đặt</a>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ STATE ============
var APP = { customers:[], accounts:[], interactions:[], user:{} };

// ============ INIT ============
function init() {
  google.script.run
    .withSuccessHandler(function(cfg) {
      if (cfg.isConfigured) {
        loadApp();
      } else {
        hide('loadingScreen');
        show('setupScreen');
      }
    })
    .withFailureHandler(function(e) {
      hide('loadingScreen');
      show('setupScreen');
    })
    .getConfig();
}

// ============ SETUP ============
function createNewSheet() {
  setMsg('setupMsg','Đang tạo Sheet...','');
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) {
        setMsg('setupMsg','Tạo thành công! URL: ' + r.url,'ok');
        setTimeout(loadApp, 1500);
      } else {
        setMsg('setupMsg', r.error, 'err');
      }
    })
    .withFailureHandler(function(e){ setMsg('setupMsg',e.message||e,'err'); })
    .setupNewSpreadsheet();
}

function connectSheet() {
  var id = document.getElementById('existingId').value.trim();
  if (!id) { setMsg('setupMsg','Vui lòng nhập ID','err'); return; }
  setMsg('setupMsg','Đang kết nối...','');
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) {
        setMsg('setupMsg', r.message, 'ok');
        setTimeout(loadApp, 1000);
      } else {
        setMsg('setupMsg', r.error, 'err');
      }
    })
    .withFailureHandler(function(e){ setMsg('setupMsg',e.message||e,'err'); })
    .setExistingSpreadsheet(id);
}

function loadApp() {
  hide('setupScreen');
  show('loadingScreen');
  google.script.run
    .withSuccessHandler(function(data) {
      APP = data;
      hide('loadingScreen');
      document.getElementById('app').style.display = 'block';
      document.getElementById('userInfo').textContent = APP.user.name + ' (' + APP.user.role + ')';
      showPage('dashboard');
    })
    .withFailureHandler(function(e) {
      hide('loadingScreen');
      document.getElementById('app').style.display = 'block';
      document.getElementById('userInfo').textContent = 'Lỗi tải dữ liệu';
      showPage('dashboard');
    })
    .getAppData();
}

// ============ PAGES ============
function showPage(page) {
  document.querySelectorAll('.sidebar a').forEach(function(a){ a.classList.remove('active'); });
  var links = document.querySelectorAll('.sidebar a');
  for (var i = 0; i < links.length; i++) {
    if (links[i].textContent.toLowerCase().indexOf(page === 'dashboard' ? 'dashboard' : page === 'customers' ? 'khách' : page === 'interactions' ? 'tương' : 'cài') > -1) {
      links[i].classList.add('active');
    }
  }
  var mc = document.getElementById('mainContent');
  if (page === 'dashboard') mc.innerHTML = renderDashboard();
  else if (page === 'customers') mc.innerHTML = renderCustomers();
  else if (page === 'interactions') mc.innerHTML = renderInteractions();
  else if (page === 'settings') mc.innerHTML = renderSettings();
}

function renderDashboard() {
  var c = APP.customers, a = APP.accounts, t = APP.interactions;
  var totalLoan = 0, totalDeposit = 0;
  for (var i = 0; i < c.length; i++) {
    totalLoan += Number(c[i]['Dư nợ']) || 0;
    totalDeposit += Number(c[i]['Huy động']) || 0;
  }
  return '<h2 style="margin-bottom:20px">📊 Tổng quan</h2>' +
    '<div class="cards">' +
      card('Khách hàng', c.length, 'Tổng số') +
      card('Dư nợ', fmt(totalLoan) + ' đ', 'Tổng dư nợ') +
      card('Huy động', fmt(totalDeposit) + ' đ', 'Tổng huy động') +
      card('Tương tác', t.length, 'Tổng ghi nhận') +
    '</div>' +
    '<div class="panel"><h2>Khách hàng gần đây</h2>' +
      (c.length === 0 ? '<p style="color:#999">Chưa có dữ liệu</p>' :
      '<table><tr><th>CIF</th><th>Tên</th><th>SĐT</th><th>Nhóm</th><th>Dư nợ</th><th>Huy động</th></tr>' +
      c.slice(-5).reverse().map(function(r) {
        return '<tr><td>'+esc(r['Mã KH (CIF)'])+'</td><td><b>'+esc(r['Tên khách hàng'])+'</b></td><td>'+esc(r['SĐT'])+'</td>' +
          '<td><span class="badge badge-blue">'+esc(r['Nhóm KH']||'—')+'</span></td>' +
          '<td>'+fmt(r['Dư nợ'])+'</td><td>'+fmt(r['Huy động'])+'</td></tr>';
      }).join('') + '</table>') +
    '</div>';
}

function renderCustomers() {
  var c = APP.customers;
  return '<div class="panel"><h2>👥 Khách hàng <button class="btn btn-p btn-sm" onclick="openCustomerModal()">+ Thêm mới</button></h2>' +
    (c.length === 0 ? '<p style="color:#999">Chưa có khách hàng. Nhấn "Thêm mới" để bắt đầu.</p>' :
    '<div style="overflow-x:auto"><table><tr><th>CIF</th><th>Tên</th><th>SĐT</th><th>Email</th><th>Nhóm</th><th>Số TK</th><th>Dư nợ</th><th>Huy động</th><th></th></tr>' +
    c.map(function(r,i) {
      return '<tr><td>'+esc(r['Mã KH (CIF)'])+'</td><td><b>'+esc(r['Tên khách hàng'])+'</b></td><td>'+esc(r['SĐT'])+'</td>' +
        '<td>'+esc(r['Email'])+'</td><td><span class="badge badge-blue">'+esc(r['Nhóm KH']||'—')+'</span></td>' +
        '<td>'+esc(r['Số TK'])+'</td><td>'+fmt(r['Dư nợ'])+'</td><td>'+fmt(r['Huy động'])+'</td>' +
        '<td><button class="btn btn-sm btn-p" onclick="openCustomerModal('+i+')">Sửa</button> ' +
        '<button class="btn btn-sm btn-d" onclick="delCustomer('+i+')">Xóa</button></td></tr>';
    }).join('') + '</table></div>') +
  '</div>';
}

function renderInteractions() {
  var t = APP.interactions;
  return '<div class="panel"><h2>💬 Tương tác <button class="btn btn-p btn-sm" onclick="openInteractionModal()">+ Ghi nhận</button></h2>' +
    (t.length === 0 ? '<p style="color:#999">Chưa có tương tác nào.</p>' :
    '<table><tr><th>CIF</th><th>Loại</th><th>Nội dung</th><th>Kết quả</th><th>Người</th><th>Ngày</th></tr>' +
    t.map(function(r) {
      return '<tr><td>'+esc(r['Mã KH (CIF)'])+'</td><td><span class="badge badge-orange">'+esc(r['Loại tương tác'])+'</span></td>' +
        '<td>'+esc(r['Nội dung'])+'</td><td>'+esc(r['Kết quả'])+'</td>' +
        '<td>'+esc(r['Người thực hiện'])+'</td><td>'+esc(r['Ngày thực hiện'])+'</td></tr>';
    }).join('') + '</table>') +
  '</div>';
}

function renderSettings() {
  return '<div class="panel"><h2>⚙️ Cài đặt</h2>' +
    '<p style="margin-bottom:12px"><b>User:</b> ' + esc(APP.user.email) + '</p>' +
    '<p style="margin-bottom:12px"><b>Role:</b> ' + esc(APP.user.role) + '</p>' +
    '<p style="margin-bottom:20px"><b>Tổng KH:</b> ' + APP.customers.length + '</p>' +
    '<button class="btn btn-p" onclick="refreshData()">🔄 Tải lại dữ liệu</button>' +
  '</div>';
}

// ============ MODALS ============
function openCustomerModal(idx) {
  var c = idx !== undefined ? APP.customers[idx] : {};
  var isEdit = idx !== undefined;
  var h = '<h3>'+(isEdit?'Sửa':'Thêm')+' Khách hàng</h3>' +
    '<input type="hidden" id="f_id" value="'+(c.ID||'')+'">' +
    '<div class="form-row">' +
      fg('f_cif','Mã KH (CIF)',c['Mã KH (CIF)']) +
      fg('f_name','Tên khách hàng',c['Tên khách hàng']) +
    '</div>' +
    '<div class="form-row">' +
      fg('f_phone','SĐT',c['SĐT']) +
      fg('f_email','Email',c['Email']) +
    '</div>' +
    '<div class="form-row">' +
      fg('f_cccd','CCCD/CMND',c['CCCD/CMND']) +
      fg('f_dob','Ngày sinh',c['Ngày sinh']) +
    '</div>' +
    fg('f_addr','Địa chỉ',c['Địa chỉ']) +
    '<div class="form-row">' +
      fg('f_group','Nhóm KH',c['Nhóm KH']) +
      fg('f_manager','Người quản lý',c['Người quản lý']) +
    '</div>' +
    '<div class="form-row">' +
      fg('f_stk','Số TK',c['Số TK']) +
      fg('f_loan','Dư nợ',c['Dư nợ']) +
    '</div>' +
    fg('f_deposit','Huy động',c['Huy động']) +
    '<div class="modal-actions">' +
      '<button class="btn" onclick="closeModal()">Hủy</button>' +
      '<button class="btn btn-p" onclick="saveCustomerForm()">Lưu</button>' +
    '</div>';
  showModal(h);
}

function saveCustomerForm() {
  var data = {
    id: gv('f_id'), 'Mã KH (CIF)': gv('f_cif'), 'Tên khách hàng': gv('f_name'),
    'SĐT': gv('f_phone'), 'Email': gv('f_email'), 'CCCD/CMND': gv('f_cccd'),
    'Ngày sinh': gv('f_dob'), 'Địa chỉ': gv('f_addr'), 'Nhóm KH': gv('f_group'),
    'Người quản lý': gv('f_manager'), 'Số TK': gv('f_stk'),
    'Dư nợ': Number(gv('f_loan')) || 0, 'Huy động': Number(gv('f_deposit')) || 0
  };
  if (!data['Tên khách hàng']) { toast('Vui lòng nhập tên khách hàng','err'); return; }
  closeModal();
  toast('Đang lưu...','ok');
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) { toast(r.message,'ok'); refreshData(); }
      else toast(r.error,'err');
    })
    .withFailureHandler(function(e){ toast(e.message||e,'err'); })
    .saveCustomer(data);
}

function delCustomer(idx) {
  var c = APP.customers[idx];
  if (!confirm('Xóa khách hàng: ' + c['Tên khách hàng'] + '?')) return;
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) { toast('Đã xóa!','ok'); refreshData(); }
      else toast(r.error,'err');
    })
    .deleteRecord('Khách hàng', c.ID);
}

function openInteractionModal() {
  var h = '<h3>Ghi nhận Tương tác</h3>' +
    fg('i_cif','Mã KH (CIF)','') +
    '<div class="form-group"><label>Loại tương tác</label><select id="i_type">' +
      '<option>Gọi điện</option><option>Gặp trực tiếp</option><option>Email</option><option>Zalo/SMS</option><option>Khác</option>' +
    '</select></div>' +
    '<div class="form-group"><label>Nội dung</label><textarea id="i_content" rows="3"></textarea></div>' +
    fg('i_result','Kết quả','') +
    fg('i_next','Kế hoạch tiếp theo','') +
    '<div class="modal-actions">' +
      '<button class="btn" onclick="closeModal()">Hủy</button>' +
      '<button class="btn btn-p" onclick="saveInteractionForm()">Lưu</button>' +
    '</div>';
  showModal(h);
}

function saveInteractionForm() {
  var data = {
    'Mã KH (CIF)': gv('i_cif'), 'Loại tương tác': document.getElementById('i_type').value,
    'Nội dung': document.getElementById('i_content').value,
    'Kết quả': gv('i_result'), 'Kế hoạch tiếp theo': gv('i_next')
  };
  closeModal();
  toast('Đang lưu...','ok');
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) { toast(r.message,'ok'); refreshData(); }
      else toast(r.error,'err');
    })
    .saveInteraction(data);
}

function refreshData() {
  google.script.run
    .withSuccessHandler(function(data) {
      APP = data;
      document.getElementById('userInfo').textContent = APP.user.name + ' (' + APP.user.role + ')';
      var active = document.querySelector('.sidebar a.active');
      var page = 'dashboard';
      if (active) {
        var t = active.textContent;
        if (t.indexOf('Khách') > -1) page = 'customers';
        else if (t.indexOf('Tương') > -1) page = 'interactions';
        else if (t.indexOf('Cài') > -1) page = 'settings';
      }
      showPage(page);
    })
    .getAppData();
}

// ============ HELPERS ============
function show(id){ document.getElementById(id).style.display = 'block'; }
function hide(id){ document.getElementById(id).style.display = 'none'; }
function gv(id){ var el = document.getElementById(id); return el ? el.value.trim() : ''; }
function esc(s){ return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){ n = Number(n) || 0; return n.toLocaleString('vi-VN'); }

function card(label, value, sub) {
  return '<div class="card"><div class="label">'+label+'</div><div class="value">'+value+'</div><div class="sub">'+sub+'</div></div>';
}

function fg(id, label, val) {
  return '<div class="form-group"><label>'+label+'</label><input type="text" id="'+id+'" value="'+esc(val||'')+'"></div>';
}

function setMsg(id, msg, type) {
  var el = document.getElementById(id);
  el.className = 'msg' + (type ? ' ' + type : '');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').classList.add('show');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'ok') + ' show';
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// ============ START ============
init();
</script>
</body>
</html>
